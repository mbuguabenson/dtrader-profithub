name: QA Checklist Generator (@checkmaite)

on:
  issue_comment:
    types: [created]

jobs:
  generate-checklist:
    # Only run on PR comments containing @checkmaite
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@checkmaite')

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    # Prevent duplicate runs
    concurrency:
      group: qa-checklist-pr-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Security Check - Validate User Access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR="${{ github.actor }}"
          echo "Validating access for user: $ACTOR"

          # Explicitly mask the token to prevent exposure in debug logs
          echo "::add-mask::${GH_TOKEN}"

          # Check if user is organization member
          MEMBERSHIP_STATUS=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/orgs/deriv-com/members/$ACTOR" \
            -w "%{http_code}" -o /dev/null)

          if [[ "$MEMBERSHIP_STATUS" == "204" ]]; then
            echo "✅ User $ACTOR is a verified organization member"
            exit 0
          fi

          # Check if user is repository collaborator
          COLLABORATOR_STATUS=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$ACTOR" \
            -w "%{http_code}" -o /dev/null)

          if [[ "$COLLABORATOR_STATUS" == "204" ]]; then
            echo "✅ User $ACTOR is a verified repository collaborator"
            exit 0
          fi

          echo "❌ Access denied for user: $ACTOR"
          echo "Only organization members and repository collaborators can trigger Claude actions."
          exit 1

      - name: Get PR Details
        id: pr
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Explicitly mask the token to prevent exposure in debug logs
          echo "::add-mask::${GH_TOKEN}"

          PR_DATA=$(curl -s --max-time 30 \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")

          # Validate JSON response structure
          if ! echo "$PR_DATA" | jq -e '.head.ref' > /dev/null 2>&1; then
            echo "❌ Failed to fetch PR details. Response:"
            echo "$PR_DATA" | jq '.' || echo "$PR_DATA"
            exit 1
          fi

          # Extract values
          PR_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
          PR_REPO=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')

          # Check for null values (deleted fork case)
          if [[ "$PR_REPO" == "null" || -z "$PR_REPO" ]]; then
            echo "❌ Cannot determine PR source repository (possibly deleted fork)"
            exit 1
          fi

          echo "ref=${PR_REF}" >> $GITHUB_OUTPUT
          echo "sha=${PR_SHA}" >> $GITHUB_OUTPUT
          echo "repo=${PR_REPO}" >> $GITHUB_OUTPUT

      - name: Validate PR Source
        run: |
          if [[ "${{ steps.pr.outputs.repo }}" != "${{ github.repository }}" ]]; then
            echo "❌ PRs from forks are not supported for security reasons"
            exit 1
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify git workspace
        run: |
          pwd
          git rev-parse --is-inside-work-tree
          git log -1 --oneline

      - name: Generate QA Checklist
        uses: anthropics/claude-code-action@8a1c4371755898f67cd97006ba7c97702d5fc4bf
        timeout-minutes: 60
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            TRIGGERED BY: @${{ github.event.comment.user.login }}

            You are a QA specialist. Your task is to generate a concise end-user testing checklist (limited to maximum of 15-20 test items) for this pull request by analyzing the codebase and understanding the application domain.

            ## Your Task

            ### 1. Understand the Application Domain

            Before generating the checklist, first understand what this application does:

            **Explore the Codebase:**
            - Read README files, CLAUDE.md, or other documentation
            - Look at package.json to understand the tech stack (React, Vue, Angular, etc.)
            - Identify the application type (web app, mobile app, API, etc.)
            - Check existing test files to understand common test scenarios
            - Look at component/module names to understand features
            - Identify key user flows from route configurations

            **Identify Key Patterns:**
            - State management (Redux, MobX, Context, Vuex, etc.)
            - API communication patterns (REST, GraphQL, WebSocket, etc.)
            - Authentication/authorization patterns
            - Responsive design patterns (mobile/desktop)
            - Real-time data handling
            - Form validation approaches

            ### 2. Analyze Changes Thoroughly

            - Read ALL modified files in this PR (use Read tool on git diff)
            - Trace imports and dependencies:
              - What components/modules import the changed files?
              - What stores/state management is affected?
              - Are any shared utilities modified?
              - What features use these components?
            - Identify side effects:
              - Context providers that might affect other areas
              - Shared state that might impact multiple features
              - Global utilities or constants
              - API/WebSocket subscription changes
              - Database schema changes
              - Configuration changes

            ### 3. Generate End-User QA Checklist

            **Requirements:**
            - **Be concise:** Focus only on critical tests. Aim for 15-20 test items maximum.
            - **Group aggressively:** Combine related tests into single items with brief sub-points.
            - Create practical testing scenarios for QA testers (not developers)
            - Focus on **user-visible behavior**, not code implementation
            - Group related tests with sub-bullets
            - Include specific values relevant to the domain (feature names, data types, user actions)
            - Think about real user workflows that might be affected
            - Tailor tests to the specific application type and domain

            **Common Edge Cases to Consider (adapt based on the application):**

            - **Data Management:**
              - Does data refresh/update correctly?
              - Are there any race conditions with async operations?
              - Does state persist correctly (localStorage, sessionStorage, database)?
              - After page refresh, is state restored correctly?
              - Does data sync across multiple tabs/windows if applicable?

            - **Navigation & Routing:**
              - Do route changes work correctly?
              - Are query parameters handled properly?
              - Is browser back/forward navigation working?
              - Are redirects functioning as expected?
              - Do deep links work?

            - **Form Validation:**
              - Are invalid inputs prevented (or show errors)?
              - Do error messages display clearly?
              - Are submit buttons disabled when form is invalid?
              - Do validation errors clear when corrected?
              - Is form data preserved on navigation away and back?

            - **Real-time/Dynamic Updates:**
              - Do live updates work (WebSocket, polling, etc.)?
              - Does the UI update when data changes?
              - Are loading states shown appropriately?
              - Do optimistic updates work correctly?

            - **Feature-Specific Logic:**
              - Does each affected feature work correctly?
              - Are feature-specific parameters/options available?
              - Do feature-specific validations apply?
              - Are there any mode switches or type selections?

            - **Responsive & State:**
              - Does mobile UI work (if different from desktop)?
              - Does desktop UI work?
              - Does tablet/intermediate size work?
              - Logged in vs logged out behavior (if applicable)?
              - Different user roles/permissions (if applicable)?

            - **Error Handling:**
              - Are errors caught and displayed appropriately?
              - Do network failures show proper error messages?
              - Are there fallback states for failures?
              - Can users recover from errors gracefully?

            - **Performance:**
              - Do lists/tables with large data sets perform well?
              - Are there any noticeable UI freezes or delays?
              - Do animations/transitions work smoothly?

            - **Accessibility:**
              - Can users navigate with keyboard only?
              - Are focus states visible?
              - Do screen readers work (if critical)?

            ### 4. Output Format

            **Keep it focused:** Skip sections not relevant to the changes.

            Post a PR comment with this format:

            ```markdown
            ## 🧪 QA Testing Checklist for PR #${{ github.event.issue.number }}

            **Generated for:** @${{ github.event.comment.user.login }}
            **Application:** [Brief description of what this application is]
            **Summary of Changes:** [1-2 sentences describing what changed]

            ---

            ### ✅ Core Functionality Tests
            - [ ] [Main feature/fix description]
              - [ ] Specific test step 1
              - [ ] Specific test step 2
            - [ ] [Related functionality]

            ### 🔍 Edge Cases & Validation
            - [ ] [Edge case 1 - be specific]
            - [ ] [Edge case 2 - be specific]
            - [ ] [Relevant validation based on changes]
            - [ ] Error states handled gracefully

            ---

            **To regenerate this checklist, comment `@checkmaite` on the PR**
            ```

            ### 5. Best Practices for Test Items

            **✅ GOOD (specific, actionable):**
            ```markdown
            Example for an e-commerce app:
            - [ ] Add product to cart from product detail page
              - [ ] Verify cart badge updates with correct count
              - [ ] Navigate to cart page and verify product appears
              - [ ] Change quantity to 3 and verify subtotal recalculates
              - [ ] Remove item and verify cart shows empty state
              - [ ] Verify cart persists after page refresh

            Example for a form-heavy app:
            - [ ] Submit contact form with valid data
              - [ ] Fill all required fields (name, email, message)
              - [ ] Click submit and verify success message appears
              - [ ] Check that form clears after successful submission
              - [ ] Verify confirmation email is sent (if applicable)
              - [ ] Test with invalid email format and verify error shown
            ```

            **❌ BAD (vague, technical):**
            ```markdown
            - [ ] Test the cart component
            - [ ] Check if store updates
            - [ ] Verify function returns correct value
            - [ ] Make sure everything works
            - [ ] Test the form
            ```

            ### 6. Important Reminders

            - **Understand the domain first:** Read docs and existing tests to understand what this app does
            - **Be specific:** Use actual feature names, data types, and values from the codebase
            - **Think like QA:** Focus on user workflows, not code internals
            - **Real-world usage:** Consider how actual users will interact with this
            - **Prioritize:** Put high-impact tests first
            - **Organize:** Group related tests logically
            - **Adapt to context:** Not all sections apply to all PRs - include only what's relevant
            - **Cover variations:** Include device/state variations that make sense for this application

            Now analyze this codebase and PR changes to generate a comprehensive, domain-appropriate QA testing checklist.
